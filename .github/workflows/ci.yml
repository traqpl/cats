name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: [self-hosted, Linux, X64, games]
    env:
      TMPDIR: ${{ github.workspace }}/.tmp
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.cache/go-mod

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Clean workspace caches with sudo
        run: sudo rm -rf "$TMPDIR" "$GOCACHE" "$GOMODCACHE" .artifacts

      - name: Prepare Go workspace directories
        run: mkdir -p "$TMPDIR" "$GOCACHE" "$GOMODCACHE" .artifacts

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0 run ./...

      - name: Run tests
        run: go test ./...

      - name: Build server
        run: go build -ldflags="-s -w" -o .artifacts/cats ./server/

      - name: Build WASM game
        run: GOOS=js GOARCH=wasm go build -ldflags="-s -w" -o .artifacts/game.wasm ./game/

      - name: Build Docker image
        run: docker build -t cats:ci .
