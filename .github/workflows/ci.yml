name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.8.0

      - name: Run gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.22.2 ./...

      - name: Run tests
        run: go test ./...

      - name: Build server
        run: go build -ldflags="-s -w" -o /tmp/purr ./server/

      - name: Build WASM game
        run: GOOS=js GOARCH=wasm go build -ldflags="-s -w" -o /tmp/game.wasm ./game/

      - name: Build Docker image
        run: docker build -t purr:ci .
