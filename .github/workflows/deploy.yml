name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Materialize TLS cert secrets
        env:
          TLS_CERT_PEM: ${{ secrets.CATS_TLS_CERT_PEM }}
          TLS_INTERMEDIATE_PEM: ${{ secrets.CATS_TLS_INTERMEDIATE_PEM }}
          TLS_PRIVATE_KEY_PEM: ${{ secrets.CATS_TLS_PRIVATE_KEY_PEM }}
          TLS_CSR_PEM: ${{ secrets.CATS_TLS_CSR_PEM }}
        run: |
          mkdir -p certs
          printf '%s\n' "$TLS_CERT_PEM" > certs/Certyfikat.txt
          printf '%s\n' "$TLS_INTERMEDIATE_PEM" > certs/Certyfikat posredni.txt
          printf '%s\n' "$TLS_PRIVATE_KEY_PEM" > certs/Klucz prywatny.txt
          if [ -n "${TLS_CSR_PEM:-}" ]; then
            printf '%s\n' "$TLS_CSR_PEM" > certs/CSR.txt
          fi

      - name: Generate embedded TLS bundle
        run: make certs

      - name: Deploy on agent host
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
        run: |
          make deploy-agent \
            DEPLOY_DIR="${DEPLOY_DIR:-$HOME/cats}" \
            PORT="${DEPLOY_PORT:-8071}"
