name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, games]
    env:
      TMPDIR: ${{ github.workspace }}/.tmp
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.cache/go-mod
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Reset self-hosted workspace with sudo
        run: |
          sudo mkdir -p "$GITHUB_WORKSPACE"
          sudo find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 \
            ! -name '_temp' \
            ! -name '_actions' \
            ! -name '_tool' \
            -exec rm -rf {} +

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          clean: false

      - name: Clean workspace caches with sudo
        run: sudo rm -rf "$TMPDIR" "$GOCACHE" "$GOMODCACHE"

      - name: Prepare Go workspace directories
        run: mkdir -p "$TMPDIR" "$GOCACHE" "$GOMODCACHE"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Remove stale embedded TLS bundle
        run: rm -f internal/certdata/encrypted.go

      - name: Deploy on agent host
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
        run: |
          make deploy-agent \
            SKIP_LINT=1 \
            SKIP_SEC=1 \
            DEPLOY_DIR="${DEPLOY_DIR:-$HOME/cats}" \
            PORT="${DEPLOY_PORT:-8071}"

  deploy-nginx:
    runs-on: [self-hosted, Linux, X64, games]
    needs: deploy
    env:
      TMPDIR: ${{ github.workspace }}/.tmp
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.cache/go-mod
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Reset self-hosted workspace with sudo
        run: |
          sudo mkdir -p "$GITHUB_WORKSPACE"
          sudo find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 \
            ! -name '_temp' \
            ! -name '_actions' \
            ! -name '_tool' \
            -exec rm -rf {} +

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2
          clean: false

      - name: Clean workspace caches with sudo
        run: sudo rm -rf "$TMPDIR" "$GOCACHE" "$GOMODCACHE"

      - name: Prepare Go workspace directories
        run: mkdir -p "$TMPDIR" "$GOCACHE" "$GOMODCACHE"

      - name: Detect proxy-related changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only HEAD^ HEAD | grep -Eq '^(nginx/|\.github/workflows/nginx-proxy\.yml$)'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip proxy deploy
        if: steps.changes.outputs.deploy != 'true'
        run: echo "No nginx proxy changes detected; skipping deploy."

      - name: Materialize proxy TLS cert secrets
        if: steps.changes.outputs.deploy == 'true'
        env:
          TLS_CERT_PEM: ${{ secrets.CATS_TLS_CERT_PEM }}
          TLS_INTERMEDIATE_PEM: ${{ secrets.CATS_TLS_INTERMEDIATE_PEM }}
          TLS_PRIVATE_KEY_PEM: ${{ secrets.CATS_TLS_PRIVATE_KEY_PEM }}
        run: |
          mkdir -p nginx/certs
          printf '%s\n' "$TLS_CERT_PEM" > "nginx/certs/cert.pem"
          printf '%s\n' "$TLS_INTERMEDIATE_PEM" > "nginx/certs/intermediate.pem"
          printf '%s\n' "$TLS_PRIVATE_KEY_PEM" > "nginx/certs/privkey.pem"
          cat "nginx/certs/cert.pem" "nginx/certs/intermediate.pem" > "nginx/certs/fullchain.pem"

      - name: Build proxy image
        if: steps.changes.outputs.deploy == 'true'
        run: docker build -t game-proxy:latest ./nginx

      - name: Deploy proxy on agent host
        if: steps.changes.outputs.deploy == 'true'
        run: |
          DEPLOY_DIR="$HOME/game-proxy"
          mkdir -p "$DEPLOY_DIR/certs"
          cp nginx/compose.yaml "$DEPLOY_DIR/compose.yaml"
          cp nginx/certs/fullchain.pem "$DEPLOY_DIR/certs/fullchain.pem"
          cp nginx/certs/privkey.pem "$DEPLOY_DIR/certs/privkey.pem"
          docker compose -f "$DEPLOY_DIR/compose.yaml" up -d --force-recreate --remove-orphans
